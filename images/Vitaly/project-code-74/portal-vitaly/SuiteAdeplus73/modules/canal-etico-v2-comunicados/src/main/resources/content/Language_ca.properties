canal.comunicado.form.paso0.titulo=Benvingut/s al Canal ètic de

canal.comunicado.form.paso0.descr1=Benvingut al Canal Ètic de la nostra entitat. Agraïm el seu compromís amb la integritat i l'ètica entitatarial. Aquest canal és un espai segur i confidencial perquè vostè pugui comunicar qualsevol preocupació, incident o irregularitat relacionada amb conductes inadequades o incompliments ètics dins de l'organització.
canal.comunicado.form.paso0.descr2=Ens comprometem a tractar la seva denúncia de manera confidencial i a prendre les accions adequades per investigar i abordar qualsevol problema plantejat. La seva identitat es mantindrà en l'anonimat, llevat que vostè decideixi revelar-la voluntàriament.
canal.comunicado.form.paso0.descr3=Podeu consultar aquí el <a href="#" class="clsProcCom target="_blank">procediment detallat de la gestió de comunicacions</a>. Gràcies per confiar en el nostre Canal Ètic i en el nostre compromís amb la integritat entitatarial.
