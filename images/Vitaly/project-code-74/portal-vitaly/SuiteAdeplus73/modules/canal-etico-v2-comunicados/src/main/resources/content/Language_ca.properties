canal.comunicado.form.paso3.titulo=Descriu tan detalladament com sigui possible el que vols comunicar
canal.comunicado.form.paso3.descr=Relati detalladament els fets o conductes sobre els quals vulguis realitzar la teva comunicació. Si tens proves documentals dels fets relatats, si us plau, incorpora aquestes evidències a través de l'opció Adjuntar arxiu/s. Podeu consultar aquí el <a href="#" class="clsProcCom" target="_blank">procediment detallat de la gestió de comunicacions.</a>
