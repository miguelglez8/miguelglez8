canal.comunicado.form.paso4.checkLeido.info=Les seves dades de caràcter personal es troben incloses en l'activitat de tractament "Canal ètic" de la qual és responsable #RAZONSOCIAL#, amb la finalitat de gestionar, tramitar i investigar les comunicacions remeses a través del Canal de Comunicacions que hem posat a la seva disposició, així com adoptar les mesures disciplinàries o tramitar els procediments judicials que, en el seu cas, procedeixin. La finalitat del tractament rau en el compliment d'una obligació legal aplicable al responsable del tractament (art. 6.1.c) del RGPD, així com en el compliment d'una missió realitzada en interès públic (art.6.1.e) del RPGD, en cas que #RAZONSOCIAL# no estigués obligada legalment a implantar aquest canal de comunicacions. Les dades personals aportades únicament seran visibles per #RAZONSOCIAL# en cas de formular la denúncia de manera no anònima. Per accedir, rectificar i suprimir les seves dades, així com exercir altres drets i ampliar informació sobre la nostra Política de Protecció de dades consulteu al nostre personal.
