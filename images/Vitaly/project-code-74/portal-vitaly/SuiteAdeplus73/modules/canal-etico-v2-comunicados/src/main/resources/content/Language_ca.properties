canal.comunicado.form.paso1.anonimo=Prefereixo comunicar anònimament
canal.comunicado.form.paso1.anonimo.descr=Si decideix realitzar la seva comunicació de manera anònima, no haurà de proporcionar cap dada identificativa, i podrà fer seguiment de la seva comunicació emprant l'identificador de la comunicació que se li proporciona al completar tots els passos d'aquest formulari. En cas que vulgui rebre comunicacions sobre l'evolució de la seva comunicació, marqui la casella al peu d'aquesta pàgina, i proporcioni a continuació una dada de contacte vàlida. En qualsevol cas, la informació subministrada serà tractada confidencialment.
