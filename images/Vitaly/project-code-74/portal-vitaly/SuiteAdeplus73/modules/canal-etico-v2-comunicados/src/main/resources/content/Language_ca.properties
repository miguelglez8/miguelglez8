canal.comunicado.form.paso1.titulo=Vol identificar-se o prefereix l'anonimat?
canal.comunicado.form.paso1.descr=Aquest Canal facilita la formulació segura de les comunicacions assegurant que durant tot el procés, i fins i tot una vegada finalitzat, es garanteixi eficaçment la protecció de la privacitat de les persones involucrades  i la confidencialitat sobre les dades contingudes a la comunicació. Si així ho considera, la comunicació es pot realitzar de forma anònima. En qualsevol cas, tindrà l'opció d'indicar  un mitjà de contacte perquè se li enviï informació sobre l'evolució de la seva comunicació. <a href="#" class="clsProcCom" target="_blank">Podeu consultar aquí el procediment de gestió de les comunicacions.</a>
canal.comunicado.form.paso1.descr.noEnlace=Aquest Canal facilita la formulació segura de les comunicacions assegurant que durant tot el procés, i fins i tot una vegada finalitzat, es garanteixi eficaçment la protecció de la privacitat de les persones involucrades  i la confidencialitat sobre les dades contingudes a la comunicació. Si així ho considera, la comunicació es pot realitzar de forma anònima. En qualsevol cas, tindrà l'opció d'indicar  un mitjà de contacte perquè se li enviï informació sobre l'evolució de la seva comunicació.
