canal.comunicado.correcto.informacion=canal.comunicado.correcto.informacion;Si us plau, guardeu aquest identificador, si no heu facilitat dades de contacte, no se us remetrà per cap altra via, i us serà requerit si voleu fer seguiment de la vostra comunicació i/o afegir-hi informació. Per dur a terme aquestes gestions, accediu a la pantalla d'inici i introduïu l'identificador. Podeu consultar aquí el <a href="#" class="clsProcCom" target="_blank">procediment detallat de la gestió de comunicacions</a>, i la <a href="#" class="clsProteccionDatos" target="_blank">informació de protecció de dades</a>.
canal.comunicado.correcto.informacion.noEnlaceProc=Si us plau, guardeu aquest identificador, si no heu facilitat dades de contacte, no se us remetrà per cap altra via, i us serà requerit si voleu fer seguiment de la vostra comunicació i/o afegir-hi informació. Per dur a terme aquestes gestions, accediu a la pantalla d'inici i introduïu l'identificador. Podeu consultar aquí la <a href="#" class="clsProteccionDatos" target="_blank">informació de protecció de dades</a>.
canal.comunicado.correcto.informacion.noEnlacePrott=Si us plau, guardeu aquest identificador, si no heu facilitat dades de contacte, no se us remetrà per cap altra via, i us serà requerit si voleu fer seguiment de la vostra comunicació i/o afegir-hi informació. Per dur a terme aquestes gestions, accediu a la pantalla d'inici i introduïu l'identificador. Podeu consultar aquí el <a href="#" class="clsProcCom" target="_blank">procediment detallat de la gestió de comunicacions</a>.
canal.comunicado.correcto.informacion.noEnlace=Si us plau, guardeu aquest identificador, si no heu facilitat dades de contacte, no se us remetrà per cap altra via, i us serà requerit si voleu fer seguiment de la vostra comunicació i/o afegir-hi informació. Per dur a terme aquestes gestions, accediu a la pantalla d'inici i introduïu l'identificador.
denuncia.view.company.validation.title=Uh-Oh! No existeix l'empresa
denuncia.view.company.validation.message.1=Heu arribat al Canal ètic / Canal de denúncies a partir d'un enllaç incorrecte.
denuncia.view.company.validation.message.2=Ja que no podem determinar l'empresa a la qual va dirigida la consulta o denúncia, us suggerim que sol·liciteu als responsables de la vostra empresa l'enllaç correcte.
denuncia.view.company.validation.message.3=Esperem tornar-vos a veure aviat.
canal.comunicado.correcto.recibi.titulo=Acús de rebuda comunicació
canal.comunicado.correcto.recibi.parrafo1=A data #FECHA# hem rebut la vostra comunicació, amb identificador
canal.comunicado.correcto.recibi.parrafo1b=, que heu enviat a través del nostre canal ètic.
canal.comunicado.correcto.recibi.parrafo2=Amb el codi proporcionat podreu afegir més informació i conèixer l'estat de la vostra comunicació ingressant a través de
canal.comunicado.correcto.recibi.infoGeneral.titulo=Informació general
canal.comunicado.correcto.recibi.infoGeneral.parrafo1=Agraïm la vostra confiança en compartir aquesta informació amb nosaltres. Aquest missatge és per confirmar que la vostra comunicació ha estat rebuda i registrada al nostre sistema.
canal.comunicado.correcto.recibi.infoGeneral.parrafo2=Ens prenem molt seriosament totes les comunicacions que rebem i estem compromesos a garantir la confidencialitat i el tractament adequat de la informació proporcionada. La vostra comunicació serà revisada i gestionada d'acord amb els
canal.comunicado.correcto.recibi.infoGeneral.parrafo2b=procediments establerts a la nostra organització.
canal.comunicado.correcto.recibi.infoGeneral.parrafo3=Apreciam la vostra participació en la promoció d'un entorn de confiança i us assegurem que la vostra comunicació serà tractada amb la màxima diligència i professionalitat.
canal.comunicado.correcto.recibi.infoGeneral.parrafo4=De nou, agraim la vostra confiança en el nostre canal ètic i el vostre compromís amb la integritat de la nostra organització.
