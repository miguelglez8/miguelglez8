canal.comunicado.form.paso4.titulo=Revisa la teva comunicació abans de finalitzar
canal.comunicado.form.paso4.descr1=A continuació, li oferim un resum de les dades que es registraran al sistema per al seu tractament. Si us plau, revisi-les amb cura, l'exactitud de la informació aportada ens permet assegurar en gran mesura la gestió adequada de la seva comunicació.
canal.comunicado.form.paso4.descr2=Si desitja modificar algun element de la seva comunicació pot tornar a les pantalles anteriors. Abans de finalitzar el procés, si us plau, llegeixi i accepti la informació de Protecció de dades. Gràcies de nou.
