canal.comunicado.form.paso2.descr=Confirmi l'Entitat sobre la qual realitzarà la comunicació, i indiqui la seva relació amb la mateixa. Aquesta informació ens ajudarà a comprendre millor el context i gestionar adequadament les comunicacions. <a href="#" class="clsProcCom" target="_blank">Podeu consultar aquí el procediment de gestió de les comunicacions.</a>
