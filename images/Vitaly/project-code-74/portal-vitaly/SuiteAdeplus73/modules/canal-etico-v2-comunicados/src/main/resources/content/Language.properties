canal.comunicado.form.paso4.checkLeido = Confirmo haber leído detenidamente la información básica sobre protección de datos, comprendiendo mis derechos y responsabilidades en cuanto al tratamiento de mis datos personales.
canal.comunicado.form.paso4.checkLeido.info = Sus datos de carácter personal se encuentran incluidos en la actividad del tratamiento "Canal ético" de la que es responsable #RAZONSOCIAL#, con la finalidad de gestionar, tramitar e investigar las comunicaciones remitidas a través del Canal de Comunicaciones que hemos puesto a su disposición, así como adoptar las medidas disciplinarias o tramitar los procedimientos judiciales que, en su caso, procedan. La finalidad del tratamiento radica en el cumplimiento de una obligación legal aplicable al responsable del tratamiento (art. 6.1.c) del RGPD, así como en el cumplimiento de una misión realizada en interés público (art.6.1.e) del RPGD, en caso que #RAZONSOCIAL# no fuera obligada legalmente a implantar dicho canal de comunicaciones. Los datos personales aportados únicamente serán visibles por #RAZONSOCIAL# en caso de formular su denuncia de manera no anónima. Para acceder, rectificar y suprimir sus datos, así como ejercer otros derechos y ampliar información sobre nuestra Política de Protección de datos consulte a nuestro personal.

