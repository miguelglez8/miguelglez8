canal.comunicado.form.paso4.titulo = Revise su comunicación antes de finalizar
canal.comunicado.form.paso4.descr1 = A continuación, le ofrecemos un resumen de los datos que se van a registrar en el sistema para su tratamiento. Por favor, revíselos cuidadosamente, la exactitud de la información aportada nos permite asegurar en gran medida la gestión adecuada de su comunicación.
canal.comunicado.form.paso4.descr2 = Si desea modificar algún elemento de su comunicación puede volver a las pantallas anteriores. Antes de finalizar el proceso por favor lea y acepte la información de Protección de datos. Gracias de nuevo.
