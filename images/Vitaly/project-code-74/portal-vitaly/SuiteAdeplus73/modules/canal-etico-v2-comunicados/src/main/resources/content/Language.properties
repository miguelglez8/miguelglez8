canal.comunicado.form.paso1.anonimo.descr =  Si decide realizar su comunicación de manera anónima, no tendrá que aportar ningún dato identificativo, y podrá realizar seguimiento de su comunicación empleando el identificador de la comunicación que se entrega al completar todos los pasos de este formulario. En caso de que desee recibir comunicaciones sobre la evolución de su comunicación, marque la casilla al pie de esta página, y proporcione a continuación un dato de contacto válido. En cualquier caso, la información suministrada será tratada confidencialmente.
