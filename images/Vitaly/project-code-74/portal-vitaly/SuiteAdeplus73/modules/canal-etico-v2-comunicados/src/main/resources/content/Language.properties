canal.comunicado.form.paso1.titulo = ¿Desea identificarse o prefiere el anonimato?
canal.comunicado.form.paso1.descr = Este Canal facilita la formulación segura de las comunicaciones asegurando que durante todo el proceso, e incluso una vez finalizado, se garantice eficazmente la protección de la privacidad de las personas involucradas  y la confidencialidad sobre los datos contenidos en la comunicación. Si así lo considera, la comunicación puede realizarse de forma anónima. En cualquier caso, tendrá la opción de indicar  un medio de contacto para que se le remita información sobre la evolución de su comunicación. <a href="#" class="clsProcCom" target="_blank">Puede consultar aquí el procedimiento de gestión de las comunicaciones.</a>
canal.comunicado.form.paso1.descr.noEnlace=Este Canal facilita la formulación segura de las comunicaciones asegurando que durante todo el proceso, e incluso una vez finalizado, se garantice eficazmente la protección de la privacidad de las personas involucradas  y la confidencialidad sobre los datos contenidos en la comunicación. Si así lo considera, la comunicación puede realizarse de forma anónima. En cualquier caso, tendrá la opción de indicar  un medio de contacto para que se le remita información sobre la evolución de su comunicación.
