canal.comunicado.form.paso2.descr = Confirme la Entidad sobre la que va a realizar la comunicación, e indique su relación con la misma. Esta información nos ayudará a comprender mejor el contexto y gestionar adecuadamente las comunicaciones. <a href="#" class="clsProcCom" target="_blank">Puede consultar aquí el procedimiento de gestión de las comunicaciones.</a>
