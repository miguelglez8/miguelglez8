canal.comunicado.form.paso0.descr1 = Bienvenido al Canal Ético de nuestra entidad. Agradecemos su compromiso con la integridad y la ética empresarial. Este canal es un espacio seguro y confidencial para que usted pueda comunicar cualquier preocupación, incidente o irregularidad relacionada con conductas  inapropiadas o incumplimientos éticos dentro de la organización.

canal.comunicado.form.paso0.descr2 = Nos comprometemos a tratar su reporte de manera confidencial y a tomar las acciones adecuadas para investigar y abordar cualquier problema planteado. Su identidad se mantendrá en el anonimato, a menos que usted decida reverlarla voluntariamente. 

canal.comunicado.form.paso0.descr3 = Puede consultar aquí el <a href="#" class="clsProcCom" target="_blank">procedimiento detallado de la gestión de comunicaciones</a>. Gracias por confiar en nuestro Canal Ético y en nuestro compromiso con la integridad empresarial.

