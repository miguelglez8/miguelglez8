canal.comunicado.form.paso3.descr = Relate detalladamente los hechos o conductas sobre los que desee realizar su comunicación. Si tiene pruebas documentales de los hechos relatados, por favor, incorpore estas evidencias a través de la opción Adjuntar archivo/s. Puede consultar aquí el <a href="#" class="clsProcCom" target="_blank">procedimiento detallado de la gestión de comunicaciones.</a>
