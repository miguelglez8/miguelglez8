canal.comunicado.form.paso4.descr1=Below, we provide a summary of the data that will be recorded in the system for processing. Please review them carefully; the accuracy of the provided information allows us to ensure the proper management of your communication.
canal.comunicado.form.paso4.descr2=If you want to modify any element of your communication, you can return to the previous screens. Before finalizing the process, please read and accept the data protection information. Thanks again.
