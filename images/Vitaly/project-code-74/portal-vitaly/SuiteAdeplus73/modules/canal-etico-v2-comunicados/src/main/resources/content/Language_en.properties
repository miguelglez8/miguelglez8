canal.comunicado.form.pasoAnadirInfo.descr=On this screen, you can view the condition of the communication management associated with the provided identifier and provide new relevant information for its management, as long as it is not finalized or expired. You can consult the <a href="#" class="clsProcCom" target="_blank">detailed procedure for managing communications</a> here.
