canal.comunicado.correcto.informacion=canal.comunicado.correcto.informacion;Please save this identifier; if you have not provided contact information, it will not be sent to you by any other means, and it will be required if you want to follow up on your communication and/or add information to it. To carry out these procedures, access the home screen and enter the identifier. You can consult the <a href="#" class="clsProcCom" target="_blank">detailed procedure for managing communications</a> and the <a href="#" class="clsProteccionDatos" target="_blank">data protection information</a> here.
canal.comunicado.correcto.informacion.noEnlaceProc=Please save this identifier; if you have not provided contact information, it will not be sent to you by any other means, and it will be required if you want to follow up on your communication and/or add information to it. To carry out these procedures, access the home screen and enter the identifier. You can consult the <a href="#" class="clsProcCom" target="_blank">detailed procedure for managing communications</a> here.
