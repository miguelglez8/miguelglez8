canal.comunicado.form.paso1.titulo=Do you want to identify yourself or prefer to remain anonymous?
canal.comunicado.form.paso1.descr=This channel facilitates the secure formulation of communications, ensuring that throughout the process, and even after it is completed, the privacy of the individuals involved and the confidentiality of the data contained in the communication are effectively guaranteed. If you consider it appropriate, the communication can be made anonymously. In any case, you will have the option to indicate a contact method to receive information about the progress of your communication. <a href="#" class="clsProcCom" target="_blank">You can consult the procedure for managing communications here.</a>
canal.comunicado.form.paso1.descr.noEnlace=This channel facilitates the secure formulation of communications, ensuring that throughout the process, and even after it is completed, the privacy of the individuals involved and the confidentiality of the data contained in the communication are effectively guaranteed. If you consider it appropriate, the communication can be made anonymously. In any case, you will have the option to indicate a contact method to receive information about the progress of your communication. <a href="#" class="clsProcCom" target="_blank">You can consult the procedure for managing communications here.</a>
