canal.comunicado.correcto.recibi.parrafo1=As of #FECHA#, we have received your communication, with identifier
canal.comunicado.correcto.recibi.parrafo1b=, which you sent through our ethical channel.
canal.comunicado.correcto.recibi.parrafo2=With the provided code, you can add more information and check the condition of your communication by entering through
canal.comunicado.correcto.recibi.infoGeneral.titulo=General information
canal.comunicado.correcto.recibi.infoGeneral.parrafo1=We appreciate your trust in sharing this information with us. This message is to confirm that your communication has been received and registered in our system.
canal.comunicado.correcto.recibi.infoGeneral.parrafo2=We take all communications we receive very seriously and are committed to ensuring the confidentiality and proper treatment of the provided information. Your communication will be reviewed and managed in accordance with the
canal.comunicado.correcto.recibi.infoGeneral.parrafo2b=procedures established in our organization.
canal.comunicado.correcto.recibi.infoGeneral.parrafo3=We appreciate your participation in promoting a trustworthy environment and assure you that your communication will be treated with the utmost diligence and professionalism.
canal.comunicado.correcto.recibi.infoGeneral.parrafo4=Once again, thank you for your trust in our ethical channel and your commitment to the integrity of our organization.
