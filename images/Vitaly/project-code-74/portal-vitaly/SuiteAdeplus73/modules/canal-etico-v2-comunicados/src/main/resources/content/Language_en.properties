denuncia.view.company.validation.title=Uh-Oh! The company does not exist
denuncia.view.company.validation.message.1=You have reached the Ethical Channel / Reporting Channel from an incorrect link.
denuncia.view.company.validation.message.2=Since we cannot determine the company to which the query or report is directed, we suggest requesting the correct link from your company's responsible parties.
denuncia.view.company.validation.message.3=We hope to see you again soon.
