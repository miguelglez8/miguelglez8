canal.comunicado.form.paso4.checkLeido.info=Your personal data is included in the processing activity "Ethical Channel" for which #RAZONSOCIAL# is responsible, with the purpose of managing, processing, and investigating the communications sent through the Communication Channel we have made available to you, as well as taking disciplinary measures or processing the judicial procedures that may be applicable. The purpose of the processing lies in compliance with a legal obligation applicable to the data controller (art. 6.1.c) of the GDPR, as well as in the fulfillment of a task carried out in the public interest (art.6.1.e) of the GDPR, in case #RAZONSOCIAL# is not legally obliged to implement said communication channel. The personally provided data will only be visible to #RAZONSOCIAL# if you formulate your report in a non-anonymous manner. To access, rectify, and delete your data, as well as exercise other rights and obtain more information about our Data Protection Policy, consult our staff.
