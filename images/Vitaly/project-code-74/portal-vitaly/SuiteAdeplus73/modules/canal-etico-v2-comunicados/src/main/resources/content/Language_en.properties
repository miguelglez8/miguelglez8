canal.comunicado.form.paso0.titulo=Welcome to the Ethical Channel of

canal.comunicado.form.paso0.descr1=Welcome to the Ethics Channel of our entity. We appreciate your commitment to the integrity and ethics of the organization. This channel is a secure and confidential space for you to report any concerns, incidents, or irregularities related to inappropriate behavior or ethical violations within the organization.
canal.comunicado.form.paso0.descr2=We commit to treating your report confidentially and taking appropriate actions to investigate and address any issues raised. Your identity will remain anonymous unless you decide to voluntarily reveal it.
canal.comunicado.form.paso0.descr3=You can consult the <a href="#" class="clsProcCom target="_blank">detailed procedure for managing communications</a> here. Thank you for trusting our Ethical Channel and our commitment to organizational integrity.
canal.comunicado.form.paso0.descr3.noEnlace=Thank you for trusting our Ethical Channel and our commitment to organizational integrity.
