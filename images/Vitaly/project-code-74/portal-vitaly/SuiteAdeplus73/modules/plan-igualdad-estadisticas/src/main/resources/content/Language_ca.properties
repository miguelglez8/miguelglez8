estadistica.puestoEstudios.tabla.info=L&#8217;objectiu d&#8217;aquesta taula &eacute;s analitzar si hi ha difer&egrave;ncies entre dones i homes. Per valorar-ho, ens fixarem en: <br/> 1. Mirar els llocs amb m&eacute;s dones, i fixar-nos en quin tipus de formaci&oacute; &eacute;s la predominant en aquest lloc. Pronunciar-nos sobre si hi ha un equilibri o desequilibri entre el nivell formatiu i les exig&egrave;ncies del lloc, valorant si la formaci&oacute; predominant en dones &eacute;s compatible amb altres llocs de treball. <br/> 2. Mirar els llocs de responsabilitat i fer una comparativa entre la formaci&oacute; que tenen els homes i la que tenen les dones. Ens pronunciarem sobre si hi ha desequilibris entre la formaci&oacute; que se&#8217;ls exigeix a les dones i la que se&#8217;ls exigeix als homes. <br/> 3. Mirar el percentatge de plantilla sense qualificaci&oacute; i amb m&eacute;s qualificaci&oacute;. Ens pronunciarem sobre si la sobrequalificaci&oacute; i la infraqualificaci&oacute; afecta m&eacute;s homes o dones. <br/> NOTA: Pronunciar-nos sobre les 3 q&uuml;estions de forma independent.

