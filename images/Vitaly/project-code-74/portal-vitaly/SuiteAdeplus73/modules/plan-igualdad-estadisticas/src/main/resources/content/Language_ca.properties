estadistica.areaPuesto.tabla.info=D&#8217;una banda, valorem com influeixen els estereotips de g&egrave;nere en assignar funcions, &egrave;s a dir, si hi ha indicadors o no de segregaci&oacute; horitzontal. Per fer-ho, ens fixarem si en algun departament/&agrave;rea, un dels sexes est&agrave; representat en m&eacute;s d&#8217;un 60%. La nostra conclusi&oacute; reflectir&agrave; aquell dept. o &agrave;rea en qu&egrave; es d&oacute;na aquesta segregaci&oacute; horitzontal. A m&eacute;s, tamb&eacute; ens fixarem en si algun lloc de treball est&agrave; representat en m&eacute;s d&#8217;un 60 % i farem una menci&oacute; especial sobre aquest, encara que es trobi dins d&#8217;un dept./&agrave;rea on no hi hagi segregaci&oacute;. \
                                  <br/>D&#8217;altra banda, valorem com es reparteixen els c&agrave;rrecs de responsabilitat entre dones i homes a l&#8217;organitzaci&oacute;, &eacute;s a dir, si existeixen o no indicadors de segregaci&oacute; vertical. Direm que hi ha segregaci&oacute; vertical quan als llocs alts de responsabilitat (intermedis o superiors), un dels sexes est&agrave; representat en m&eacute;s d&#8217;un 60%. A m&eacute;s, aquesta segregaci&oacute; ser&agrave; encara m&eacute;s gran quan als llocs amb aquest indicador negatiu (>60% en un sexe), aquest sexe &eacute;s el que menys % de representaci&oacute; t&eacute; a la plantilla (taula 1). Per donar la conclusi&oacute;, farem refer&egrave;ncia a en quins llocs en concret es reflecteix la segregaci&oacute;.

