estadistica.reduccionJornada.tabla.info=L&#8217;objectiu d&#8217;aquesta taula &eacute;s identificar els efectes que la situaci&oacute; personal i familiar de la plantilla pot tenir sobre la pres&egrave;ncia de Dones i Homes a l&#8217;organitzaci&oacute;. Per aix&ograve;, compararem les reduccions totals amb les reduccions per motius familiars (guarda legal de menors, guarda legal de persones amb discapacitat, cura de familiar que no es pot valdre per si mateix), i ens pronunciarem sobre si les reduccions de jornada per efectes de la situaci&oacute; personal i familiar, es donen m&eacute;s als homes o a les dones. <br/> NOTA: Tot i que el t&iacute;tol de la taula es refereix al nombre de fills, nosaltres ens pronunciarem sobre persones dependents. 

