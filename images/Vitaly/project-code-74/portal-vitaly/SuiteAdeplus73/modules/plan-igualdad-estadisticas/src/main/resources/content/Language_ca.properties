estadistica.puestoAntiguedad.tabla.info=L&#8217;objectiu d&#8217;aquesta taula &eacute;s observar l&#8217;antiguitat de Dones i Homes per valorar el grau d&#8217;estabilitat laboral i si les pol&iacute;tiques de conciliaci&oacute; faciliten o no la perman&egrave;ncia de dones a l&#8217;empresa. Per aix&ograve;, ens pronunciarem sobre dues q&uuml;estions: <br/> 1. Pronunciar-nos sobre la perman&egrave;ncia de les dones a l&#8217;empresa. Considerem que no hi ha estabilitat laboral quan m&eacute;s del 40 % de les dones es trobin al tram "fins a 5 anys". <br/> 2. Pronunciar-nos sobre l&#8217;impacte que t&eacute; les responsabilitats familiars sobre l&#8217;antiguitat de la dona. Per aix&ograve; compararem si hi ha difer&egrave;ncies significatives en l&#8217;antiguitat segons tingui o no persones a c&agrave;rrec. <br/> NOTA: Tot i que el t&iacute;tol de la taula es refereix al nombre de fills, nosaltres ens pronunciarem sobre persones dependents. <br/> NOTA: Pronunciar-nos sobre les dues q&uuml;estions de forma independent

