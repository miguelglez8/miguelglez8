estadistica.puestoDependientes.tabla.info=L&#8217;objectiu d&#8217;aquesta taula &eacute;s observar si hi ha llocs de treball en qu&egrave; hi ha difer&egrave;ncies associades al fet de tenir responsabilitats familiars. Per a la nostra valoraci&oacute;, ens fixarem en el seg&uuml;ent: <br/> 1. Comparar els llocs amb 0 fills vs. els que tenen algun fill i veure si hi ha difer&egrave;ncies significatives. Cridarem l&#8217;atenci&oacute; sobre els llocs on el nombre de dones sense fills sigui major al 60% sobre el total de dones en aquest lloc. <br/> 2. Comparar els llocs de responsabilitat amb 0 fills vs. els que tenen algun fill i veure si hi ha difer&egrave;ncies significatives. Cridarem l&#8217;atenci&oacute; sobre els llocs de responsabilitat on el nombre de dones sense fills sigui major al 60% sobre el total de dones en aquest lloc. <br/> NOTA: Tot i que el t&iacute;tol de la taula es refereix al nombre de fills, nosaltres ens pronunciarem sobre persones dependents. <br/> NOTA: Pronunciar-nos sobre les dues q&uuml;estions de forma independent <br/> NOTA: Per desagregar a la taula el nombre de fills de les persones de cada lloc, fer doble clic al lloc i donar-li a "N&uacute;m. de Fills/es i fami. Dependents"

