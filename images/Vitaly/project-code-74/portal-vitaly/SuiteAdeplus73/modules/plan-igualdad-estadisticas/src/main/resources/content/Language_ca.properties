estadistica.edad.tabla.info=L&#8217;objectiu d&#8217;aquesta taula &eacute;s analitzar si l&#8217;Organitzaci&oacute; t&eacute; o no en compte persones que es trobin en una etapa de la seva vida en qu&egrave; les responsabilitats de cura siguin m&eacute;s grans. Per aix&ograve;, ens fixarem en la franja d&#8217;edat en qu&egrave; solen donar-se responsabilitats de cura (entre 25 i 45 anys) i veurem si concentra un nombre m&eacute;s gran de Dones o d&#8217;Homes (>Ā60Ā%). Farem una menci&oacute; especial si el sexe infrarepresentat s&oacute;n les dones en edat de maternitat (per possible discriminaci&oacute;). 

