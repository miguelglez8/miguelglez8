estadistica.plantilla.tabla.info=L&#8217;objectiu d&#8217;aquesta taula &eacute;s valorar si l&#8217;Organitzaci&oacute; est&agrave;: masculinitzada, feminitzada o equilibrada. Per aix&ograve;, ens haurem de fixar en el percentatge. En cas que el percentatge d&#8217;homes en plantilla sigui superior al 60%, es considera que l&#8217;organitzaci&oacute; est&agrave; masculinitzada. En cas que el percentatge de dones en plantilla sigui superior al 60%, l&#8217;organitzaci&oacute; es considera feminitzada. En cas que ambd&oacute;s sexes es trobin entre el 40-60%, considerem que l&#8217;organitzaci&oacute; est&agrave; equilibrada.

