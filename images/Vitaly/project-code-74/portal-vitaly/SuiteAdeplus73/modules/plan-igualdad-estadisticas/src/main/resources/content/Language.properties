estadistica.areaPuesto.tabla.info=Por un lado, valoramos c&oacute;mo influyen los estereotipos de g&eacute;nero al asignar funciones, es decir, s&iacute; existen indicadores o no de segregaci&oacute;n horizontal. Para ello, nos fijaremos en si en alg&uacute;n departamento/&aacute;rea, uno de los sexos est&aacute; representado en m&aacute;s de un 60%. Nuestra conclusi&oacute;n, reflejar&aacute; aquel dpto. o &aacute;rea en el que se da dicha segregaci&oacute;n horizontal. Adem&aacute;s, tambi&eacute;n nos fijaremos en si alg&uacute;n puesto de trabajo est&aacute; representado en m&aacute;s de un 60 % y haremos una especial menci&oacute;n sobre &eacute;ste, aunque se encuentre dentro de un dpto./&aacute;rea donde no exista segregaci&oacute;n. \
                                  <br/>Por otro lado, valoramos c&oacute;mo se reparten los cargos de responsabilidad entre mujeres y hombres en la organizaci&oacute;n, es decir, si existen o no indicadores de segregaci&oacute;n vertical. Diremos que existe segregaci&oacute;n vertical cuando en los puestos altos de responsabilidad (intermedios o superiores), uno de los sexos est&aacute; representado en m&aacute;s de un 60 %. Adem&aacute;s, esta segregaci&oacute;n ser&aacute; a&uacute;n mayor cuando en los puestos con dicho indicador negativo (>60% en un sexo), dicho sexo es el que menos % de representaci&oacute;n tiene en la plantilla (tabla 1). Para dar la conclusi&oacute;n, haremos referencia a en qu&eacute; puesto/s en concreto se refleja la segregaci&oacute;n.

