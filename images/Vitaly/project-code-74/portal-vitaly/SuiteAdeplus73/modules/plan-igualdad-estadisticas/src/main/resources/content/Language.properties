estadistica.puestoDependientes.tabla.info=El objetivo de la presente tabla es observar s&#237; existen puestos de trabajo en los que existen diferencias asociadas al hecho de tener responsabilidades familiares. Para nuestra valoraci&oacute;n, nos fijaremos en lo siguiente: <br/> 1. Comparar los puestos con 0 hijos vs. los que tienen alg&uacute;n hijo y ver si hay diferencias significativas. Llamaremos la atenci&oacute;n sobre los puestos en los que el n&uacute;mero de mujeres sin hijos sea mayor al 60% sobre el total de mujeres en ese puesto. <br/> 2. Comparar los puestos de responsabilidad con 0 hijos vs. los que tienen alg&uacute;n hijo y ver si hay diferencias significativas. Llamaremos la atenci&oacute;n sobre los puestos de responsabilidad en los que el n&uacute;mero de mujeres sin hijos sea mayor al 60 % sobre el total de mujeres en ese puesto. <br/> NOTA: Pese a que el t&iacute;tulo de la tabla refiera n&ordm; de hijos, nosotros nos pronunciaremos sobre personas dependientes. <br/> NOTA: Pronunciarnos sobre las dos cuestiones de forma independiente <br/> NOTA: Para desagregar en la tabla el n&uacute;mero de hijos de las personas de cada puesto, hacer doble click en el puesto y darle a "N.&ordm; de Hijos/as y fami. Dependientes"

