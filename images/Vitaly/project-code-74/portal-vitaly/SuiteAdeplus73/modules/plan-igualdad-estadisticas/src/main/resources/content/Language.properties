estadistica.puestoEstudios.tabla.info=El objetivo de la presente tabla es analizar s&#237; existen diferencias entre mujeres y hombres. Para valorarlo, nos fijaremos en: <br/> 1. Mirar los puestos con m&aacute;s mujeres, y fijarnos en qu&eacute; tipo de formaci&oacute;n es la predominante en dicho puesto. Pronunciarnos sobre si existe un equilibrio o desequilibrio entre el nivel formativo y las exigencias del puesto, valorando si la formaci&oacute;n predominante en mujeres es compatible con otros puestos de trabajo. <br/> 2. Mirar los puestos de responsabilidad y realizar una comparativa entre la formaci&oacute;n que tienen los hombres y la que tienen las mujeres. Nos pronunciaremos sobre si hay desequilibrios entre la formaci&oacute;n que se le exige a las mujeres y la que se le exige a los hombres. <br/> 3. Mirar el porcentaje de plantilla sin cualificaci&oacute;n y con mayor cualificaci&oacute;n. Nos pronunciaremos sobre si la sobrecualificaci&oacute;n y la infracualificaci&oacute;n afecta m&aacute;s a hombres o a mujeres. <br/> NOTA: Pronunciarnos sobre las 3 cuestiones de forma independiente.

