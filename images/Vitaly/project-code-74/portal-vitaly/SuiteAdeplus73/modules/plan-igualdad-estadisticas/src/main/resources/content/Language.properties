estadistica.plantilla.tabla.info=El objetivo de la presente tabla es valorar s&#237; la Organizaci&oacute;n est&aacute;: masculinizada, feminizada o equilibrada. Para ello, deberemos fijarnos en el porcentaje. En el caso de que el porcentaje de Hombres en plantilla sea superior al 60% se considera que la organizaci&oacute;n est&aacute; masculinizada. En caso de que el porcentaje de Mujeres en plantilla sea superior al 60%, la organizaci&oacute;n se considera feminizada. En caso de que ambos sexos se encuentren entre el 40-60%, consideramos que la organizaci&oacute;n est&aacute; equilibrada.

