estadistica.puestoAntiguedad.tabla.info=El objetivo de la presente tabla es observar la antig&uuml;edad de Mujeres y Hombres, para valorar el grado de estabilidad laboral y s&#237; las pol&iacute;ticas de conciliaci&oacute;n facilitan o no la permanencia de mujeres en la empresa. Para ello, nos pronunciaremos sobre dos cuestiones: <br/> 1. Pronunciarnos sobre la permanencia de las mujeres en la empresa. Consideramos que no hay estabilidad laboral cuando m&aacute;s del 40 % de las mujeres se encuentren en el tramo "hasta 5 a&nacute;os". <br/> 2. Pronunciarnos sobre el impacto que las responsabilidades familiares tiene en la antig&uuml;edad de la mujer. Para ello compararemos si hay diferencias significativas en la antig&uuml;edad seg&uacute;n tenga o no personas a cargo. <br/> NOTA: Pese a que el t&iacute;tulo de la tabla refiera n&ordm; de hijos, nosotros nos pronunciaremos sobre personas dependientes. <br/> NOTA: Pronunciarnos sobre las dos cuestiones de forma independiente

