estadistica.edad.tabla.info=El objetivo de la presente tabla es analizar s&#237; la Organizaci&oacute;n tiene o no en cuenta a personas que se encuentren en una etapa de su vida en las que las responsabilidades de cuidado sean mayores. Para ello, nos fijaremos en la franja de edad en las que suelen darse responsabilidades de cuidado (entre 25 y 45 a&ntilde;os) y veremos si concentra un mayor n&uacute;mero de Mujeres o de Hombres (>60%). Haremos una especial menci&oacute;n si el sexo infrarrepresentado sean las mujeres en edad de maternidad (por posible discriminaci&oacute;n). 

