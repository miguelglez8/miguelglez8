estadistica.puestoEdad.tabla.info=El objetivo de la presente tabla es analizar los puestos de trabajo con mayor responsabilidad y ver s&#237; en &eacute;stos puede influir que las personas se encuentren en una etapa de su vida en las que las responsabilidades de cuidado sean mayores. Para ello, cogeremos los puestos de mando intermedio y superiores y veremos si en las franjas de edad con mayores responsabilidades de cuidado (entre 25 y 45 a&nacute;os). El indicador ser&aacute; negativo cuando la diferencia de presencia de Hombres y mujeres en dichas franjas sea superior al (40-60%). Hacer una especial menci&oacute;n en caso de que sean las mujeres las menos representadas (por posible discriminaci&oacute;n por maternidad).

