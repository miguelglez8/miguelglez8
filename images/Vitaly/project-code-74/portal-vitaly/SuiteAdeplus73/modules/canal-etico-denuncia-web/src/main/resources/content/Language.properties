# View
denuncia.view.step.title=Formular denuncia y/o consulta
denuncia.view.step.empresa=Selección de la empresa
denuncia.view.step.empresa.title=En primer lugar, verifique la Organización a la que desea formular una denuncia o consulta e indique la relación la misma.
denuncia.view.step.empresa.help=Texto descriptivo de esta fase a realizar por parte de Adeplus que indique al usuario como debe proceder. Indicar que los textos deben ser reales, no poner denuncias falsas, etc. Si tiene alguna duda, puede ponerse en <a href="/web/canal-etico-denuncias/contacto" target="_blank">contacto</a> con el administrador.
denuncia.view.step.empleado=Datos personales
denuncia.view.step.empleado.title=Sus datos no serán revelados bajo ningún concepto al denunciado/consultado, que le solicitan a los solos efectos de establecer una garantía en la indemnidad (no represalias) del denunciante establecida en la normativa.
denuncia.view.step.empleado.help=Gracias por su colaboración en la gestión y prevención de irregularidades en nuestra Entidad. Vd. puede realizar denuncias/consultas anónimas, facilitando sólo un e-mail a efectos de contacto, que no será accesible por nuestra Entidad. En cualquier caso, el e-mail que facilite será utilizado para informarle del curso de su denuncia.
denuncia.view.step.denuncia=Tipo de consulta o denuncia
denuncia.view.step.denuncia.title=Seleccione qué tipo de consulta o denuncia quiere notificar.
denuncia.view.step.denuncia.help=Por favor, indique ahora si desea denunciar o consultar, y si es sobre una temática en particular utilizando para ello la selección de opciones disponibles en esta pantalla.
denuncia.view.step.detalle=Contenido
denuncia.view.step.detalle.title=Describa lo más detallado posible lo que quiere notificar.
denuncia.view.step.detalle.help=Por favor, relate los hechos que desea denunciar/consultar. Recuerde que la garantía de indemnidad está condicionada a que tenga motivos razonables para creer que la información aportada es veraz en el momento de formular la denuncia, de buena fe, en otro caso podría incurrir en responsabilidades legales. Si lo estima oportuno y dispone de documentos que apoyen su denuncia/consulta, apórtelos en este formulario.
denuncia.view.step.confirma=Finalizar
denuncia.view.step.confirma.help=A continuación le mostramos los datos que se incorporan al expediente de denuncia/consulta creado, revíselo y confirme en su caso. Gracias de nuevo por su Colaboración.
denuncia.view.step.confirmation.help=Por favor, confirma términos y condiciones.Si tiene alguna duda, puede ponerse en contacto con el administrador.
