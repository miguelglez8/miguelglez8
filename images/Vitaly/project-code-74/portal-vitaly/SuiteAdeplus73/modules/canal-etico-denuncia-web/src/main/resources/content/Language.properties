denuncia.view.confirma.aceptar.proteccion=He leído y acepto la <a data-toggle="collapse" href="#collapseProteccion" role="button" aria-expanded="false" aria-controls="collapseProteccion">información básica</a> sobre protección de datos.
denuncia.view.confirma.aceptar.proteccion.message=Sus datos de carácter personal se incluirán en la actividad de tratamiento "Canal Ético/Denuncias" de la que es responsable Adeplus Consultores S.LU.., con la finalidad de permitir la interposición de Denuncias /Consultas, finalidad basada en el interés público (art. 6.1 e) del RGPD, para gestionar su denuncia. Sus datos personales de contacto sólo podrán ser visibles por la Organización denunciada si opta por formular su denuncia de manera no anónima. Puede acceder, rectificar y suprimir sus datos así como ejercer otros derechos y ampliar información sobre nuestra Política de Protección de datos en <a href="https://adeplusconsultores.com/politica-privacidad/" target="_blank">www.adeplusconsultores.com/politica-privacidad</a>.
