createcompany.csv.error.row.title=Hay errores en los datos en el fichero CSV en la fila :
createcompany.csv.error.row=<p>A continuaci&#243;n se describen los errores encontrados en la fila del csv : </p>
createcompany.csv.error.name.empty=<p>El nombre de la empresa est&#225; vac&#237;o. Debe indicarse el nombre en el primer campo del csv.</p>
createcompany.csv.error.name.repeated=<p>El nombre de la empresa ya existe. No se pueden crear dos empresas con el mismo nombre.</p>
createcompany.csv.error.cif.empty=<p>El CIF de la empresa est&#225; vac&#237;o. Debe indicarse el CIF en el campo 2 del csv.</p>
createcompany.csv.error.cif.repeated=<p>El CIF de la empresa ya existe. No se pueden crear dos empresas con el mismo CIF.</p>
createcompany.csv.error.admin.name=<p>No se ha indicado nombre del administrador. Debe indicarse el nombre en el campo 3 del csv.</p>
createcompany.csv.error.admin.surname=<p>No se ha indicado apellidos del administrador. Debe indicarse los apellidos en el campo 4 del csv.</p>
createcompany.csv.error.admin.nif=<p>No se ha indicado NIF del administrador. Debe indicarse el nif en el campo 5 del csv.</p>
createcompany.csv.error.admin.mail.empty=<p>No se ha indicado mail del administrador. Debe indicarse el mail en el campo 6 del csv.</p>
createcompany.csv.error.admin.mail=<p>El mail del administrador no es correcto. Debe indicarse un mail correcto con el formato nombre@dominio.com.</p>
createcompany.csv.error.admin.mail.repeated=<p>El mail del administrador ya existe en el sistema. Es posible que ese mail ya se use como usuario o administrador en otra empresa.</p>
createcompany.csv.error.locale=<p>El idioma de la empresa debe ser es_ES o ca_ES. Cualquier otro valor ser&#225; incorrecto.</p>

