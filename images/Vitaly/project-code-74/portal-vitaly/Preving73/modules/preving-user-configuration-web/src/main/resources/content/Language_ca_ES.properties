user.csv.import.validation.error.title=Hi ha errors a les dades al fitxer CSV a la fila:
user.csv.import.validation.error=<p>A continuació es descriuen els errors que s'han trobat a la fila del csv: </p>

user.csv.import.validation.error.nif.empty=<p>No s'ha indicat el NIF de l'usuari. S'ha d'indicar al camp 1 del csv.</p>
user.csv.import.validation.error.name.empty=<p>No s'ha indicat el nom de l'usuari. S'ha d'indicar al camp 2 del csv.</p>
user.csv.import.validation.error.surnave.empty=<p>No s'han indicat els cognoms de l'usuari. S'ha d'indicar al camp 3 del csv.</p>
user.csv.import.validation.error.mail.empty=<p>No s'ha indicat el correu electrònic de l'usuari. S'ha d'indicar al camp 4 del csv.</p>
user.csv.import.validation.error.job.empty=<p>No s'ha indicat el lloc de l'usuari. S'ha d'indicar al camp 5 del csv.</p>
user.csv.import.validation.error.workcenter.empty=<p>No s'ha indicat el centre de treball de l'usuari. S'ha d'indicar al camp 6 del csv.</p>
user.csv.import.validation.error.salary.empty=<p>No s'ha indicat el salari de l'usuari. S'ha d'indicar al camp 7 del csv.</p>
user.csv.import.validation.error.locale=<p>L'idioma de l'usuari ha de ser ca_ES o ca_ES.</p>

user.csv.import.validation.error.nif.duplicate=<p>El NIF de l'usuari ja existeix. No es poden crear dos usuaris amb el mateix NIF.</p>
user.csv.import.validation.error.mail.incorrect=<p>El correu electrònic de l'usuari no és correcte. Cal indicar un correu electrònic amb el format nom@domini.com</p>
user.csv.import.validation.error.mail.duplicate=<p>El correu electrònic de l'usuari ja existeix al sistema. És possible que aquest correu electrònic ja s'utilitzi com a usuari o administrador en una altra empresa.</p>

user.csv.import.validation.error.nif.duplicated=<p>El CSV conté NIF d'usuari repetits.</p>
user.csv.import.validation.error.name.duplicate=<p>El CSV conté correus electrònics d'usuari repetits.</p>

user.csv.import.validation.error.import=Error de format en importar usuaris des de fitxer CSV a Registre horari. www.miregistrodehoras.com
user.csv.import.validation.error.message=<p>El format no és correcte, el nombre de camps del fitxer CSV ha de ser 6 i ha de tenir el següent format: NIF;NOM;COGNOMS;CORREU ELECTRÒNIC;LLOC DE TREBALL;SEU</p><p>Revisi el csv per cercar-hi errors.</p>

user.csv.import.validation.error.company=Error en importar empresa des de fitxer CSV a Registre horari. www.miregistrodehoras.com
user.csv.import.validation.error.import.csv=<p>Revisi el fitxer CSV i verifiqui que totes les dades són correctes, sense camps en blanc.</p>

user.csv.import.validation.error.repeated=Hi ha valors repetits al fitxer CSV. No s'han pogut crear els usuaris.
user.csv.import.validation.error.repeated.message= <p>Per evitar errors en la creació d'usuaris, no es permeten NIF o correus electrònics duplicats. Ha de corregir el CSV per realitzar la importació.</p>

